<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cola de Espera | Zona VR</title>
    <link rel="stylesheet" href="styles.css">
    <script src="vue.js"></script>
</head>
<body>
    <div id="app" class="fade-in">
        <!-- ENCABEZADO -->
        <header>
            <div class="logo">
                Zona<span>VR</span>
            </div>
            <div class="nav-badge">
                <span class="dot" :class="{ disconnected: !connected }"></span>
                {{ connected ? 'En Línea' : 'Desconectado' }}
            </div>
        </header>
        <!-- CONTENIDO PRINCIPAL -->
        <div class="container" style="max-width: 1400px; margin: 2rem auto; padding: 0 1.5rem;">
            <div class="center-container">
                <h1 class="mobile-title">Cola de Espera Zona VR</h1>
            </div>

            <!-- TABLERO EN COLUMNAS POR CATEGORÍA -->
            <template v-for="(sims, groupName) in groupedSimulators" :key="groupName">
                <div v-if="sims.some(s => s.active)" style="margin-bottom: 3rem;">
                    <h2 style="font-family: var(--font-rajdhani); font-size: 1.3rem; color: var(--color-cyan); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 1.2rem; border-left: 4px solid var(--color-cyan); padding-left: 0.6rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 0.4rem;">
                        📂 {{ groupName }}
                    </h2>
                    
                    <div class="client-board-grid">
                        <!-- Columnas de Simuladores Activos -->
                        <template v-for="sim in sims" :key="sim.id">
                            <div v-if="sim.active" class="sim-column">
                                <div class="sim-column-header">
                                    {{ sim.name }}
                                </div>
                                
                                <div class="sim-column-cards">
                            <!-- 1. CASO JUGANDO (Sesión Activa) -->
                            <div v-if="sim.status !== 'available' && sim.current_session" class="sim-card playing" :class="{ warning: isTimeWarning(sim), finished: isTimeFinished(sim) }">
                                <div class="sim-header" style="margin-bottom: 0.8rem;">
                                    <span class="sim-status-badge status-playing">JUGANDO</span>
                                </div>
                                
                                <div class="sim-card-row">
                                    <span class="sim-card-label">Nombre:</span>
                                    <span class="sim-card-val" style="font-weight: 800;">{{ sim.current_session.group_name }}</span>
                                </div>
                                <div class="sim-card-row">
                                    <span class="sim-card-label">Nº Jugadores:</span>
                                    <span class="sim-card-val">{{ sim.current_session.players_count || 1 }}</span>
                                </div>
                                <div class="sim-card-row">
                                    <span class="sim-card-label">Mapa:</span>
                                    <span class="sim-card-val">{{ sim.current_session.map }}</span>
                                </div>
                                <div class="sim-card-row" style="margin-top: 0.6rem;">
                                    <span class="sim-card-label">Restante:</span>
                                    <span class="sim-card-val">
                                        <div class="timer-digits" style="font-size: 1.6rem;" :class="{ warning: isTimeWarning(sim), finished: isTimeFinished(sim) }">
                                            {{ isTimeFinished(sim) ? '00:00' : formatTime(sim.current_session.time_left) }}
                                        </div>
                                    </span>
                                </div>
                                <!-- Barra de Progreso -->
                                <div class="progress-bar-bg" style="margin-top: 0.4rem;">
                                    <div class="progress-bar-fill" :style="{ width: getProgress(sim) + '%' }"></div>
                                </div>
                            </div>
                            
                            <!-- Si no está ocupado y no hay nadie en cola -->
                            <div v-if="sim.status === 'available' && getQueueForSim(sim.id).length === 0" class="sim-card available" style="text-align: center; padding: 2rem 1rem;">
                                <span class="sim-status-badge status-available" style="margin-bottom: 0.5rem; display: inline-block;">DISPONIBLE</span>
                                <div class="sim-empty-state">Listo para jugar</div>
                            </div>
                            
                            <!-- 2. CASO EN ESPERA (Grupos en Cola para este simulador) -->
                            <div v-for="(item, queueIndex) in getQueueForSim(sim.id)" :key="item.id" class="sim-card waiting">
                                <div class="sim-header" style="margin-bottom: 0.8rem;">
                                    <span class="sim-status-badge status-waiting">EN ESPERA</span>
                                    <span style="font-size: 0.8rem; font-weight: bold; color: var(--color-magenta);">#{{ queueIndex + 1 }} en cola</span>
                                </div>
                                
                                <div class="sim-card-row">
                                    <span class="sim-card-label">Nombre:</span>
                                    <span class="sim-card-val" style="font-weight: 700;">{{ item.group_name }}</span>
                                </div>
                                <div class="sim-card-row">
                                    <span class="sim-card-label">Nº Jugadores:</span>
                                    <span class="sim-card-val">{{ item.players_count || 1 }}</span>
                                </div>
                                <div class="sim-card-row">
                                    <span class="sim-card-label">Mapa:</span>
                                    <span class="sim-card-val">{{ item.map }}</span>
                                </div>
                                <div class="sim-card-row" style="margin-top: 0.4rem; border-top: 1px solid rgba(255,255,255,0.03); padding-top: 0.4rem;">
                                    <span class="sim-card-label" style="font-size: 0.8rem;">Tiempo espera:</span>
                                    <span class="sim-card-val" style="font-weight: 700; color: var(--color-yellow);">
                                        ~{{ Math.ceil(getEstimatedWaitTime(sim.id, queueIndex) / 60) }} min
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </template>
            
            <div v-if="!simulators.some(s => s.active)" class="queue-empty">
                No hay simuladores activos en este momento.
            </div>
        </div>
    </div>

    <!-- Cargar App -->
    <script src="app.js"></script>
</body>
</html>
